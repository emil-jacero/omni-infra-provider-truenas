name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA. The comment on each
# `uses:` records the semver the SHA resolves to today so Dependabot
# (.github/dependabot.yml with ecosystem: github-actions) can propose bumps.
# Never downgrade from SHA-pinning — a moved tag on a popular action with
# `id-token: write` scope would give the attacker keyless signing for our
# release artifacts.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test (unit + cassette replay, race-enabled)
        run: make test

      # Hard cassette-completeness gate. Fails if an integration test has no
      # cassette to replay against — catches the silent-skip false-green we
      # had before the 2026-04-15 cassette backfill.
      - name: Verify integration cassettes present
        env:
          CI_REQUIRE_CASSETTES: "1"
        run: go test -count=1 -run TestIntegration_ ./internal/client/... ./internal/cleanup/... ./internal/provisioner/...

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install betterleaks v1.1.1
        env:
          BETTERLEAKS_VERSION: "1.1.1"
          BETTERLEAKS_SHA256: "d590d5f051e49f6769c61dc8cebbce947b20a4042e2915ee234760f81a01c8c4"
        run: |
          curl -sSfL "https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/betterleaks.tar.gz
          echo "${BETTERLEAKS_SHA256}  /tmp/betterleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/betterleaks.tar.gz -C /usr/local/bin betterleaks
          chmod +x /usr/local/bin/betterleaks

      - name: Scan for secrets
        run: betterleaks git --baseline-path .betterleaks-baseline.json --verbose --exit-code 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

      # shellcheck on every script under scripts/ — cheap to run, catches
      # the class of regressions that don't surface until an operator
      # actually runs the script on a stale shell. v0.16.x added
      # annotate-machineclass-autoscale.sh which mutates Omni state via
      # `omnictl apply`; a quoting/expansion regression there would land
      # silently in users' hands without this gate.
      - name: shellcheck
        run: |
          if find scripts -name '*.sh' -print -quit | grep -q .; then
            shellcheck -S warning scripts/*.sh
          else
            echo "no shell scripts to check"
          fi

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # Pin govulncheck to an explicit version so a compromised release
      # cannot execute arbitrary code in CI (see v0.15 security pass).
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  generate:
    # Regenerate protobuf-backed code in a container with pinned protoc
    # versions and fail if the working tree differs from the committed
    # generated file. Prevents a maintainer from smuggling a diverged
    # specs.pb.go (supply-chain M17).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install pinned protoc and protoc-gen-go
        run: |
          curl -sSfL https://github.com/protocolbuffers/protobuf/releases/download/v27.1/protoc-27.1-linux-x86_64.zip -o /tmp/protoc.zip
          # SHA256 of protoc-27.1-linux-x86_64.zip from
          # https://github.com/protocolbuffers/protobuf/releases/tag/v27.1
          # Pin mutation = a "refresh the sha256 and continue" signal, not a
          # free pass — rotate only when the release on GitHub is verified
          # still authored by the protobuf maintainers.
          echo "8970e3d8bbd67d53768fe8c2e3971bdd71e51cfe2001ca06dacad17258a7dae3  /tmp/protoc.zip" | sha256sum -c -
          unzip -qo /tmp/protoc.zip -d /tmp/protoc
          sudo mv /tmp/protoc/bin/protoc /usr/local/bin/
          sudo cp -r /tmp/protoc/include /usr/local/
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: Regenerate
        run: make generate

      - name: Fail on diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::generated code differs from committed output — run 'make generate' locally and commit the result"
            exit 1
          fi
