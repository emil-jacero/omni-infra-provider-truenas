apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omni-infra-provider-truenas.fullname" . }}
  labels:
    {{- include "omni-infra-provider-truenas.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "omni-infra-provider-truenas.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omni-infra-provider-truenas.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      # Provider talks to Omni over gRPC + TrueNAS over WebSocket; it never
      # reads the Kubernetes API. Refusing the token avoids handing a SA
      # credential to a container that has no business with cluster RBAC.
      automountServiceAccountToken: false
      containers:
        - name: provider
          {{- if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ include "omni-infra-provider-truenas.imageTag" . }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "omni-infra-provider-truenas.fullname" . }}
            - secretRef:
                name: {{ include "omni-infra-provider-truenas.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - containerPort: {{ include "omni-infra-provider-truenas.healthPort" . }}
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
